<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arli Marketplace - Buy & Sell AI Agents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            color: white;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0 40px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filters input, .filters select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            min-width: 150px;
        }
        
        .filters input:focus, .filters select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .agent-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .agent-header {
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
        }
        
        .tier-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .tier-COMMON { background: #9e9e9e; }
        .tier-UNCOMMON { background: #4caf50; }
        .tier-RARE { background: #2196f3; }
        .tier-EPIC { background: #9c27b0; }
        .tier-LEGENDARY { background: linear-gradient(45deg, #ffd700, #ffed4e); color: #333; }
        
        .agent-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .agent-source {
            opacity: 0.8;
            font-size: 0.9em;
        }
        
        .agent-body {
            padding: 25px;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .agent-stat {
            text-align: center;
        }
        
        .agent-stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .agent-stat-label {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        
        .capabilities {
            margin-bottom: 20px;
        }
        
        .capabilities h4 {
            margin-bottom: 10px;
            color: #444;
        }
        
        .capability-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .capability-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: #555;
        }
        
        .agent-footer {
            padding: 20px 25px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            font-size: 1.8em;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .upload-section h2 {
            margin-bottom: 20px;
            color: #444;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-label {
            display: inline-block;
            padding: 15px 40px;
            background: #f0f0f0;
            border: 2px dashed #ccc;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-label:hover {
            background: #e0e0e0;
            border-color: #667eea;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px 30px;
            background: #4caf50;
            color: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        
        .empty-state h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Arli Marketplace</h1>
            <p>Buy and Sell AI Agents with Real Experience</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-agents">0</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-volume">$0</div>
                <div class="stat-label">Total Volume</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avg-price">$0</div>
                <div class="stat-label">Avg Price</div>
            </div>
        </div>
        
        <div class="upload-section">
            <h2>📤 Upload Your Agent</h2>
            <div class="file-input-wrapper">
                <input type="file" id="agent-file" accept=".json" onchange="uploadAgent(this)">
                <label for="agent-file" class="file-label">
                    Drop JSON file here or click to browse
                </label>
            </div>
        </div>
        
        <div class="filters">
            <input type="text" id="search-input" placeholder="Search agents..." onkeyup="searchAgents()">
            <select id="tier-filter" onchange="filterAgents()">
                <option value="">All Tiers</option>
                <option value="COMMON">Common</option>
                <option value="UNCOMMON">Uncommon</option>
                <option value="RARE">Rare</option>
                <option value="EPIC">Epic</option>
                <option value="LEGENDARY">Legendary</option>
            </select>
            <select id="sort-filter" onchange="sortAgents()">
                <option value="price">Sort by Price</option>
                <option value="level">Sort by Level</option>
                <option value="date">Sort by Date</option>
            </select>
        </div>
        
        <div id="agents-container" class="agents-grid">
            <div class="loading">Loading agents...</div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script>
        const API_URL = 'http://157.180.88.143:8002';
        let allAgents = [];
        
        // Load agents on page load
        async function loadAgents() {
            try {
                const response = await fetch(`${API_URL}/agents`);
                const data = await response.json();
                allAgents = data.agents || [];
                displayAgents(allAgents);
                updateStats(data);
            } catch (error) {
                console.error('Error loading agents:', error);
                document.getElementById('agents-container').innerHTML = `
                    <div class="empty-state">
                        <h3>⚠️ Error</h3>
                        <p>Could not connect to marketplace API</p>
                    </div>
                `;
            }
        }
        
        // Display agents
        function displayAgents(agents) {
            const container = document.getElementById('agents-container');
            
            if (agents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No agents yet</h3>
                        <p>Be the first to upload an agent!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-header">
                        <span class="tier-badge tier-${agent.tier}">${agent.tier}</span>
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-source">${agent.source_system}</div>
                    </div>
                    <div class="agent-body">
                        <div class="agent-stats">
                            <div class="agent-stat">
                                <div class="agent-stat-value">${agent.level}</div>
                                <div class="agent-stat-label">Level</div>
                            </div>
                            <div class="agent-stat">
                                <div class="agent-stat-value">${agent.xp || 0}</div>
                                <div class="agent-stat-label">XP</div>
                            </div>
                            <div class="agent-stat">
                                <div class="agent-stat-value">${agent.capabilities?.length || 0}</div>
                                <div class="agent-stat-label">Skills</div>
                            </div>
                        </div>
                        <div class="capabilities">
                            <h4>Capabilities</h4>
                            <div class="capability-tags">
                                ${(agent.capabilities || []).slice(0, 4).map(cap => `
                                    <span class="capability-tag">${cap.name}</span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="agent-footer">
                        <div class="price">$${(agent.price || 0).toFixed(2)}</div>
                        <button class="btn btn-primary" onclick="buyAgent('${agent.arli_id}')">
                            Buy Now
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Update stats
        async function updateStats(data) {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const stats = await response.json();
                
                document.getElementById('total-agents').textContent = stats.active_listings;
                document.getElementById('total-volume').textContent = '$' + (stats.total_volume || 0).toFixed(0);
                document.getElementById('avg-price').textContent = '$' + (stats.average_price || 0).toFixed(0);
            } catch (e) {
                console.error('Error loading stats:', e);
            }
        }
        
        // Upload agent
        async function uploadAgent(input) {
            const file = input.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`${API_URL}/agents/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`✅ Agent "${result.name}" listed for $${result.price}!`);
                    loadAgents(); // Refresh
                } else {
                    showNotification('❌ Upload failed', true);
                }
            } catch (error) {
                console.error('Upload error:', error);
                showNotification('❌ Upload failed: ' + error.message, true);
            }
            
            // Reset input
            input.value = '';
        }
        
        // Buy agent
        async function buyAgent(agentId) {
            const buyerId = prompt('Enter your buyer ID (or leave blank for anonymous):') || 'anonymous';
            
            try {
                const response = await fetch(`${API_URL}/agents/${agentId}/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ buyer_id: buyerId })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showNotification(`🎉 Purchased! Download at: ${result.download_url}`);
                    loadAgents(); // Refresh
                } else {
                    showNotification('❌ Purchase failed', true);
                }
            } catch (error) {
                console.error('Buy error:', error);
                showNotification('❌ Purchase failed', true);
            }
        }
        
        // Search agents
        function searchAgents() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allAgents.filter(agent => 
                agent.name.toLowerCase().includes(query) ||
                agent.source_system.toLowerCase().includes(query)
            );
            displayAgents(filtered);
        }
        
        // Filter agents
        function filterAgents() {
            const tier = document.getElementById('tier-filter').value;
            let filtered = allAgents;
            
            if (tier) {
                filtered = filtered.filter(agent => agent.tier === tier);
            }
            
            displayAgents(filtered);
        }
        
        // Sort agents
        function sortAgents() {
            const sortBy = document.getElementById('sort-filter').value;
            let sorted = [...allAgents];
            
            if (sortBy === 'price') {
                sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
            } else if (sortBy === 'level') {
                sorted.sort((a, b) => b.level - a.level);
            } else if (sortBy === 'date') {
                sorted.sort((a, b) => new Date(b.listed_at) - new Date(a.listed_at));
            }
            
            displayAgents(sorted);
        }
        
        // Show notification
        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.background = isError ? '#f44336' : '#4caf50';
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 5000);
        }
        
        // Load on startup
        loadAgents();
    </script>
</body>
</html>
