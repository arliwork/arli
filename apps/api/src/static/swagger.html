<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
    <link rel="icon" type="image/png" href="https://fastapi.tiangolo.com/img/favicon.png"/>
    <title>ARLI API Documentation</title>
    <style>
        body { margin: 0; padding: 0; }
        .topbar { background: #1a1a2e !important; }
        .topbar .download-url-wrapper { display: none; }
        .swagger-ui .info .title { color: #2563eb; font-size: 2.5em; }
        .swagger-ui .info { margin: 30px 0; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = function() {
            window.ui = SwaggerUIBundle({
                url: '/openapi.json',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.presets.standaloneLayout],
                layout: "StandaloneLayout",
                defaultModelsExpandDepth: 3,
                validatorUrl: null
            });
        };
    </script>
</body>
</html>
