<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arli Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .header {
            text-align: center;
            color: white;
            padding: 3rem 0;
        }
        .header h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .header p { font-size: 1.25rem; opacity: 0.9; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .agent-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .agent-card:hover { transform: translateY(-4px); }
        .tier {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .tier-COMMON { background: #e5e7eb; color: #374151; }
        .tier-UNCOMMON { background: #d1fae5; color: #065f46; }
        .tier-RARE { background: #dbeafe; color: #1e40af; }
        .price {
            font-size: 2rem;
            font-weight: bold;
            color: #059669;
            margin-top: 1rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        .hidden { display: none; }
        .success { color: #059669; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Arli Marketplace</h1>
            <p>Buy and sell trained AI agents</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 1rem;">📤 Upload Your Agent</h2>
            <div class="upload-area" onclick="document.getElementById('file').click()">
                <input type="file" id="file" accept=".json" class="hidden" onchange="handleFile(event)">
                <p style="font-size: 1.25rem; color: #666;">Click to select agent JSON file</p>
                <p style="color: #999; margin-top: 0.5rem;">Generated by arli-export-skill</p>
            </div>
            <div id="preview" style="margin-top: 1rem;"></div>
            <div id="result"></div>
        </div>

        <div class="card">
            <h2>🛒 Available Agents</h2>
            <div id="agents" class="agent-grid">
                <p>Loading agents...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentAgent = null;

        async function loadAgents() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();
                displayAgents(data.agents || []);
            } catch (e) {
                console.log('Using static data');
                // Static demo data
                displayAgents([
                    {
                        arli_id: "demo_1",
                        name: "Crypto Trading Bot",
                        tier: "RARE",
                        level: 15,
                        xp: 3200,
                        price: 299.99,
                        capabilities: [{name: "BTC Trading"}, {name: "Risk Management"}]
                    },
                    {
                        arli_id: "demo_2", 
                        name: "Content Writer Pro",
                        tier: "UNCOMMON",
                        level: 8,
                        xp: 1200,
                        price: 149.99,
                        capabilities: [{name: "SEO Writing"}, {name: "Blog Posts"}]
                    }
                ]);
            }
        }

        function displayAgents(agents) {
            const container = document.getElementById('agents');
            if (agents.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No agents listed yet. Be the first!</p>';
                return;
            }
            container.innerHTML = agents.map(a => `
                <div class="agent-card">
                    <span class="tier tier-${a.tier}">${a.tier}</span>
                    <h3>${a.name}</h3>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value">${a.level}</div>
                            <div style="font-size: 0.75rem; color: #666;">Level</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${a.xp}</div>
                            <div style="font-size: 0.75rem; color: #666;">XP</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${a.capabilities?.length || 0}</div>
                            <div style="font-size: 0.75rem; color: #666;">Skills</div>
                        </div>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0;">
                        ${(a.capabilities || []).slice(0, 3).map(c => 
                            `<span style="background: #f3f4f6; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">${c.name}</span>`
                        ).join('')}
                    </div>
                    <div class="price">$${a.price}</div>
                    <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="alert('Coming soon!')">Buy Now</button>
                </div>
            `).join('');
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    currentAgent = data;
                    
                    const preview = document.getElementById('preview');
                    preview.innerHTML = `
                        <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 1rem; border-radius: 8px;">
                            <h3 style="color: #166534; margin-bottom: 0.5rem;">✅ ${data.name} loaded</h3>
                            <p>Level: ${data.level} (${data.tier}) | XP: ${data.xp}</p>
                            <p>Estimated Value: $${data.estimated_market_value}</p>
                            <div style="margin-top: 1rem;">
                                <input type="number" id="price" placeholder="Set your price (USD)" 
                                    style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; width: 200px;"
                                    value="${Math.round(data.estimated_market_value * 1.2)}">
                                <button class="btn" onclick="uploadAgent()" style="margin-left: 0.5rem;">List for Sale</button>
                            </div>
                        </div>
                    `;
                } catch (err) {
                    document.getElementById('result').innerHTML = 
                        `<p class="error">❌ Invalid JSON file</p>`;
                }
            };
            reader.readAsText(file);
        }

        async function uploadAgent() {
            const price = document.getElementById('price').value;
            if (!price || !currentAgent) return;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Uploading...</p>';

            // Store in localStorage for demo
            const listings = JSON.parse(localStorage.getItem('listings') || '[]');
            listings.push({
                ...currentAgent,
                price: parseFloat(price),
                listed_at: new Date().toISOString()
            });
            localStorage.setItem('listings', JSON.stringify(listings));

            resultDiv.innerHTML = `
                <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
                    <p class="success">✅ Agent listed successfully!</p>
                    <p>Price: $${price}</p>
                    <p>ID: ${currentAgent.arli_id}</p>
                </div>
            `;

            // Refresh display
            loadAgents();
        }

        // Load on start
        loadAgents();
    </script>
</body>
</html>
