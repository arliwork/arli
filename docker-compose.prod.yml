version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-arli}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-arli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arli}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for task queue
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # API Server
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-arli}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-arli}
      REDIS_URL: redis://redis:6379
      ICP_NETWORK: ${ICP_NETWORK:-ic}
      ICP_PRIVATE_KEY: ${ICP_PRIVATE_KEY}
      PLATFORM_PRINCIPAL: ${PLATFORM_PRINCIPAL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET: ${BINANCE_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/src
    command: uvicorn real_server:app --host 0.0.0.0 --port 8000 --workers 4

  # Task Workers
  workers:
    build:
      context: ./apps/workers
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-arli}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-arli}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET: ${BINANCE_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/workers:/app
    command: python -m task_queue

  # Frontend (Next.js)
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_ICP_NETWORK: ${ICP_NETWORK:-ic}
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - api

volumes:
  postgres_data:
  redis_data:
